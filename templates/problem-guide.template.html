<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PAGE_TITLE}}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@700;900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #141825;
      --bg-tertiary: #1e2433;
      --accent-primary: #00d4ff;
      --accent-secondary: #ff006e;
      --accent-tertiary: #8338ec;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --success: #00ff94;
      --warning: #ffba08;
      --danger: #ff006e;
      --code-bg: #0d1117;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Work Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0;
      z-index: 9999;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      transition: width 0.1s;
    }

    .problem-header {
      max-width: 1200px;
      margin: 1.5rem auto 1rem;
      padding: 1.75rem 2rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(20,24,37,0.96), rgba(30,36,51,0.92));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .problem-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: slideDown 0.6s ease-out;
    }

    .problem-tagline {
      color: var(--text-secondary);
      margin-top: 0.35rem;
      max-width: 820px;
    }

    .difficulty-badge {
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border-radius: 999px;
      border: 2px solid var(--warning);
      color: var(--warning);
      background: rgba(255,186,8,0.16);
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: rgba(10,14,26,0.95);
      backdrop-filter: blur(10px);
      padding: 0.95rem 2rem;
    }

    .nav-links {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-tab-link {
      color: var(--text-secondary);
      background: transparent;
      border: none;
      padding: 0;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .nav-tab-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: var(--accent-primary);
      transition: width 0.2s;
    }

    .nav-tab-link:hover,
    .nav-tab-link.active {
      color: var(--accent-primary);
    }

    .nav-tab-link:hover::after,
    .nav-tab-link.active::after {
      width: 100%;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 2rem 3rem;
    }

    .section {
      display: none;
    }

    .section.active-page {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card h2,
    .card h3,
    .card h4 {
      margin: 0.6rem 0 0.5rem;
      color: var(--accent-primary);
    }

    .card p {
      color: var(--text-secondary);
      margin: 0.55rem 0;
    }

    .card code {
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 0.05rem 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #bcefff;
    }

    .card pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.9rem 0;
      line-height: 1.5;
    }

    .card pre code {
      background: transparent;
      padding: 0;
      color: var(--text-primary);
      font-size: 0.86rem;
      display: block;
    }

    .card ul,
    .card ol {
      margin: 0.45rem 0 0.7rem 1.3rem;
      color: var(--text-secondary);
    }

    .card li { margin: 0.2rem 0; }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1.2rem;
    }

    .meta-pill {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .meta-pill strong { color: var(--text-primary); }

    .small-note {
      color: var(--text-secondary);
      font-size: 0.92rem;
      margin-top: 0.35rem;
    }

    a {
      color: var(--accent-primary);
    }

    @media (max-width: 880px) {
      .problem-header {
        flex-direction: column;
        align-items: flex-start;
        margin: 0.75rem;
        padding: 1.2rem;
      }

      .problem-title {
        font-size: 2rem;
      }

      nav {
        padding: 0.8rem 1rem;
      }

      .container {
        padding: 1.6rem 1rem 2.4rem;
      }

      .section-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>

<header class="problem-header">
  <div>
    <h1 class="problem-title">{{PROBLEM_TITLE}}</h1>
    <p class="problem-tagline">{{TAGLINE}}</p>
  </div>
  <div class="difficulty-badge">{{DIFFICULTY}}</div>
</header>

<nav>
  <ul class="nav-links">
    {{NAV_ITEMS}}
  </ul>
</nav>

<main class="container">
  <section id="overview" class="section">
    <h2 class="section-title">Overview</h2>
    <div class="card">
      <div class="meta-grid">
        {{META_PILLS}}
      </div>
      <p class="small-note">Generated from context file: <code>{{SOURCE_FILE}}</code></p>
    </div>
  </section>

  {{SECTION_HTML}}
</main>

<script>
  const allSections = Array.from(document.querySelectorAll('.section'));
  const navButtons  = Array.from(document.querySelectorAll('.nav-tab-link'));
  const sectionIds  = new Set(allSections.map(s => s.id));

  function showSection(id) {
    allSections.forEach(s => s.classList.toggle('active-page', s.id === id));
    navButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.section === id));
    history.replaceState(null, '', '#' + id);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  navButtons.forEach(btn => {
    btn.addEventListener('click', () => showSection(btn.dataset.section));
  });

  const hash = window.location.hash.replace('#', '');
  showSection(sectionIds.has(hash) ? hash : (navButtons[0]?.dataset.section || 'overview'));

  window.addEventListener('scroll', () => {
    const h = document.documentElement;
    const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
    const bar = document.getElementById('progressBar');
    if (bar) bar.style.width = pct + '%';
  });
</script>
</body>
</html>
